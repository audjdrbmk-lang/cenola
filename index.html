<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>윤블링 단가표</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f9f8f5;
  --border: #e5e3dc;
  --border2: #d0cec5;
  --text: #1a1917;
  --text2: #6b6860;
  --text3: #a8a59e;
  --accent: #2a2926;
  --info: #1a5fb4;
  --info-bg: #eef3fb;
  --success: #1a7f4b;
  --success-bg: #edfaf3;
  --warning: #b5670a;
  --warning-bg: #fef6e7;
  --danger: #c0392b;
  --danger-bg: #fdf0ee;
  --radius: 6px;
  --radius-lg: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
  --shadow-md: 0 4px 12px rgba(0,0,0,.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; min-height: 100vh; }

/* ── HEADER ── */
.header { background: var(--accent); color: #fff; padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.header-left { display: flex; align-items: center; gap: 12px; }
.logo { font-size: 15px; font-weight: 600; letter-spacing: -.3px; }
.sync-status { font-size: 11px; opacity: .6; display: flex; align-items: center; gap: 5px; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #4caf50; }
.sync-dot.saving { background: #ff9800; animation: pulse .8s infinite; }
.sync-dot.error { background: #f44336; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.header-actions { display: flex; gap: 8px; }

/* ── TABS ── */
.tabs-wrap { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; position: sticky; top: 52px; z-index: 40; }
.tabs { display: flex; gap: 0; }
.tab { padding: 12px 18px; cursor: pointer; font-size: 12px; font-weight: 500; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s; white-space: nowrap; }
.tab.on { color: var(--text); border-bottom-color: var(--accent); }
.tab:hover:not(.on) { color: var(--text); }

/* ── MAIN ── */
.main { padding: 20px 24px; max-width: 100%; }
.page { display: none; }
.page.on { display: block; }

/* ── SECTION ── */
.section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 16px; overflow: hidden; }
.sec-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 8px; }
.sec-title { display: flex; align-items: center; gap: 8px; }
.grp-name-input { font-size: 13px; font-weight: 600; border: none; background: transparent; color: var(--text); outline: none; min-width: 60px; max-width: 140px; cursor: text; }
.grp-name-input:focus { border-bottom: 1.5px solid var(--border2); }
.badge { font-size: 10px; padding: 2px 9px; border-radius: 20px; font-weight: 500; }
.badge-n { background: var(--info-bg); color: var(--info); }
.badge-s { background: var(--warning-bg); color: var(--warning); }
.sec-actions { display: flex; gap: 6px; align-items: center; }

/* ── BUTTONS ── */
.btn { padding: 5px 12px; border: 1px solid var(--border2); border-radius: var(--radius); cursor: pointer; font-size: 11px; font-weight: 500; background: var(--surface); color: var(--text); transition: all .15s; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; font-family: inherit; }
.btn:hover { background: var(--surface2); border-color: var(--border2); }
.btn-primary { background: var(--accent); color: #fff; border-color: transparent; }
.btn-primary:hover { opacity: .85; }
.btn-danger { color: var(--danger); border-color: #e8c0bb; }
.btn-danger:hover { background: var(--danger-bg); }
.btn-success { background: var(--success); color: #fff; border-color: transparent; }
.btn-success:hover { opacity: .85; }
.btn-ghost { border-style: dashed; color: var(--text3); background: transparent; }
.btn-ghost:hover { color: var(--text); background: var(--surface2); }
.btn-sm { padding: 3px 8px; font-size: 10px; }
.btn-icon { padding: 4px 7px; }

/* ── CAT CHIPS ── */
.cat-row { display: flex; gap: 6px; flex-wrap: wrap; padding: 8px 16px; align-items: center; border-bottom: 1px solid var(--border); background: #fafaf8; }
.chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border: 1px solid var(--border); border-radius: 20px; font-size: 10px; background: var(--surface); }
.chip-x { cursor: pointer; color: var(--text3); font-size: 9px; }
.chip-x:hover { color: var(--danger); }

/* ── TABLE ── */
.table-wrap { overflow-x: auto; }
table { border-collapse: collapse; font-size: 11px; white-space: nowrap; width: 100%; }
th { background: var(--surface2); font-weight: 500; font-size: 10px; color: var(--text2); text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); line-height: 1.4; vertical-align: bottom; }
th:last-child { border-right: none; }
td { padding: 4px 6px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); vertical-align: middle; }
td:last-child { border-right: none; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #fafaf8; }
tbody tr:hover td.col-check,
tbody tr:hover td.col-drag,
tbody tr:hover td.col-img,
tbody tr:hover td.col-name { background: #fafaf8; }
tbody tr[style*="background:var(--info-bg)"] td.col-check,
tbody tr[style*="background:var(--info-bg)"] td.col-drag,
tbody tr[style*="background:var(--info-bg)"] td.col-img,
tbody tr[style*="background:var(--info-bg)"] td.col-name { background: var(--info-bg); }

/* number input 화살표 제거 */
input[type=number] { -moz-appearance: textfield; }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

input[type=number], input[type=text] { width: 100%; padding: 3px 6px; border: 1px solid transparent; border-radius: 4px; font-size: 11px; background: transparent; color: var(--text); outline: none; font-family: inherit; }
input[type=number]:hover, input[type=text]:hover { border-color: var(--border); }
input[type=number]:focus, input[type=text]:focus { border-color: var(--border2); background: var(--surface); }
select { width: 100%; font-size: 11px; padding: 3px 5px; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); color: var(--text); font-family: inherit; outline: none; }

/* 이미지 */
.img-c { width: 38px; height: 38px; border-radius: 4px; object-fit: cover; display: block; cursor: pointer; }
.img-ph { width: 38px; height: 38px; border: 1px dashed var(--border2); border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text3); font-size: 8px; text-align: center; line-height: 1.4; transition: all .15s; }
.img-ph:hover { background: var(--surface2); border-color: var(--text3); }

/* 분할 셀 */
.split-th { padding: 0 !important; min-width: 96px; }
.split-th-inner { display: flex; flex-direction: column; }
.split-th-top { padding: 5px 8px; font-size: 10px; font-weight: 500; color: var(--text2); border-bottom: 1px solid var(--border); }
.split-th-bot { padding: 3px 8px; font-size: 9px; font-weight: 400; color: var(--text3); }
.split-td { padding: 0 !important; }
.split-td-inner { display: flex; flex-direction: column; }
.split-top { padding: 3px 6px; border-bottom: 1px solid var(--border); }
.split-bot { padding: 3px 6px; font-size: 10px; color: var(--info); cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 96px; }
.split-bot:hover { background: var(--info-bg); }
.split-bot.empty { color: var(--text3); }
.split-bot.empty:hover { color: var(--info); }

/* 합계 셀 */
.total-cell { text-align: right; font-weight: 600; font-size: 11px; }
.vat-cell { text-align: right; font-weight: 500; font-size: 11px; color: var(--info); }
.nr { text-align: right; }

/* 추가 메뉴 버튼 */
.add-menu-th { width: 56px; }
.add-menu-btn { display: inline-flex; align-items: center; gap: 2px; padding: 4px 6px; border: 1px dashed var(--border2); border-radius: 4px; cursor: pointer; font-size: 9px; color: var(--text3); background: transparent; white-space: nowrap; font-family: inherit; }
.add-menu-btn:hover { color: var(--text); border-color: var(--text3); background: var(--surface2); }

/* ── MODAL ── */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
.modal-bg.on { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; width: 380px; max-width: 100%; box-shadow: var(--shadow-md); }
.modal h3 { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
.fg { margin-bottom: 12px; }
.fg label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 4px; font-weight: 500; }
.fg input, .fg select { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 12px; background: var(--surface); color: var(--text); outline: none; font-family: inherit; }
.fg input:focus, .fg select:focus { border-color: var(--border2); }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

/* ── INFO BOX ── */
.info-box { font-size: 11px; color: var(--text2); margin: 12px 16px; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface2); display: flex; align-items: center; gap: 8px; }

/* ── DIVIDER ── */
.divider { height: 1px; background: var(--border); margin: 16px 0; }

/* ── LOADING ── */
.loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,.85); z-index: 300; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--text2); }

/* ── TOAST ── */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; padding: 9px 20px; border-radius: 20px; font-size: 12px; z-index: 400; opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }

/* ── STICKY COLUMNS (이미지+제품명 고정) ── */
.col-img  { position: sticky; left: 0; z-index: 5; background: inherit; }
.col-name { position: sticky; left: 46px; z-index: 5; background: inherit; box-shadow: 2px 0 4px rgba(0,0,0,.06); }
th.col-img  { position: sticky; left: 0; z-index: 11; background: var(--surface2); }
th.col-name { position: sticky; left: 46px; z-index: 11; background: var(--surface2); box-shadow: 2px 0 4px rgba(0,0,0,.06); }

/* 체크박스+드래그 컬럼도 sticky */
.col-check { position: sticky; left: 0; z-index: 5; background: inherit; width: 28px; }
.col-drag  { position: sticky; left: 28px; z-index: 5; background: inherit; width: 24px; }
th.col-check { position: sticky; left: 0; z-index: 11; background: var(--surface2); }
th.col-drag  { position: sticky; left: 28px; z-index: 11; background: var(--surface2); }
.col-img  { left: 52px; }
.col-name { left: 98px; box-shadow: 2px 0 5px rgba(0,0,0,.07); }
th.col-img  { left: 52px; }
th.col-name { left: 98px; box-shadow: 2px 0 5px rgba(0,0,0,.07); }

/* ── STICKY TABLE HEADER ── */
.table-wrap {
  overflow-x: auto;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  max-height: calc(100vh - 160px);
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
}
.table-wrap table {
  border-collapse: separate;
  border-spacing: 0;
}
.table-wrap table thead th {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 1px 0 var(--border);
}
.table-wrap table thead th.split-th .split-th-inner {
  background: var(--surface2);
}

/* ── MOBILE ── */
@media (max-width: 768px) {
  body { font-size: 12px; }
  .header { padding: 0 12px; height: 46px; }
  .logo { font-size: 13px; }
  .sync-status { display: none; }
  .tabs-wrap { padding: 0 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tab { padding: 8px 10px; font-size: 10px; }
  .main { padding: 8px 6px; }
  .section { border-radius: 6px; margin-bottom: 10px; }
  .sec-head { padding: 7px 10px; gap: 6px; }
  .grp-name-input { font-size: 12px; max-width: 110px; }
  .badge { font-size: 9px; padding: 1px 7px; }
  .btn { padding: 4px 8px; font-size: 10px; gap: 3px; }
  .btn-sm { padding: 3px 6px; font-size: 9px; }
  .btn-icon { padding: 3px 6px; }
  table { font-size: 10px; }
  th { font-size: 9px; padding: 4px 5px; }
  td { padding: 3px 4px; }
  input[type=number], input[type=text] { font-size: 10px; padding: 2px 3px; }
  select { font-size: 10px; padding: 2px 3px; }
  .img-c, .img-ph { width: 30px; height: 30px; font-size: 7px; }
  .split-th { min-width: 72px; }
  .split-th-top { font-size: 9px; padding: 3px 4px; }
  .split-th-bot { font-size: 8px; padding: 2px 4px; }
  .split-bot { font-size: 9px; max-width: 72px; padding: 2px 4px; }
  .total-cell, .vat-cell { font-size: 10px; min-width: 60px; }
  .add-menu-btn { font-size: 8px; padding: 3px 5px; }
  .info-box { font-size: 10px; margin: 6px 8px; padding: 6px 10px; }
  .cat-row { padding: 5px 8px; gap: 4px; }
  .chip { font-size: 9px; padding: 2px 6px; }
  .modal { padding: 14px; width: 100%; max-width: 360px; }
  .modal h3 { font-size: 13px; margin-bottom: 12px; }
  .fg { margin-bottom: 8px; }
  .fg label { font-size: 10px; }
  .fg input, .fg select { font-size: 12px; padding: 6px 8px; }
  .divider { margin: 10px 0; }
}

/* ── PRICE CONFIRM POPUP ── */
#price-confirm-popup {
  display:none;
  position:absolute;
  z-index:300;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:8px;
  box-shadow:var(--shadow-md);
  padding:10px 14px;
  flex-direction:column;
  gap:8px;
  min-width:180px;
  font-size:12px;
}
.pc-row { display:flex; align-items:center; gap:6px; }
.pc-label { color:var(--text3); font-size:10px; width:28px; }
.pc-val { font-weight:500; }
.pc-val.new { color:var(--success); }
.pc-btns { display:flex; gap:6px; margin-top:2px; }

/* ── DRAG & DROP ── */
.dragging { opacity: .4; background: var(--info-bg) !important; }
.drag-over { border-top: 2px solid var(--info) !important; }
tr[draggable] { cursor: grab; }
tr[draggable]:active { cursor: grabbing; }

/* ── CHECKBOX ── */
.row-check { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); }
.bulk-bar { display: none; align-items: center; gap: 8px; padding: 7px 12px; background: var(--info-bg); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.bulk-bar.show { display: flex; }
.bulk-count { font-size: 11px; color: var(--info); font-weight: 500; }

/* ── SOLD OUT GROUP ── */
.soldout-badge { font-size: 10px; padding: 2px 9px; border-radius: 20px; background: #f0f0f0; color: #888; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="logo">윤블링 단가표</div>
    <div class="sync-status" id="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-text">연결됨</span>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn btn-sm" style="background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.2)" onclick="saveData()">
      <i class="fa-solid fa-cloud-arrow-up"></i> 저장
    </button>
  </div>
</div>

<!-- TABS -->
<div class="tabs-wrap">
  <div class="tabs">
    <div class="tab on" onclick="sTab('cost',this)">기본 단가표</div>
    <div class="tab" onclick="sTab('buyer',this)">바이어 단가표</div>
    <div class="tab" onclick="sTab('supplier',this)">업체 정보</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="page on" id="pg-cost"></div>
  <div class="page" id="pg-buyer"></div>
  <div class="page" id="pg-supplier"></div>
</div>

<!-- MODALS -->
<div class="modal-bg" id="link-modal">
  <div class="modal">
    <h3>업체 연결</h3>
    <div class="fg"><label>메뉴 선택</label><select id="lk-menu"></select></div>
    <div class="fg"><label>업체 선택</label><select id="lk-sup"></select></div>
    <div class="modal-footer">
      <button class="btn btn-danger" style="margin-right:auto" onclick="clearLink()">연결 해제</button>
      <button class="btn" onclick="closeM('link-modal')">취소</button>
      <button class="btn btn-primary" onclick="saveLink()">저장</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="menu-modal">
  <div class="modal"><h3 id="mm-title">메뉴</h3>
    <div class="fg"><label>메뉴명</label><input id="menu-inp" type="text"></div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="menu-del-btn" onclick="delMenuModal()" style="margin-right:auto">삭제</button>
      <button class="btn" onclick="closeM('menu-modal')">취소</button>
      <button class="btn btn-primary" onclick="saveMenu()">저장</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="sup-modal">
  <div class="modal"><h3 id="sup-title">업체 등록</h3>
    <div class="fg"><label>업체명</label><input id="s-co" type="text"></div>
    <div class="fg"><label>담당자명</label><input id="s-ct" type="text"></div>
    <div class="fg"><label>연락처</label><input id="s-ph" type="text"></div>
    <div class="fg"><label>이메일</label><input id="s-em" type="text"></div>
    <div class="fg"><label>담당 부자재 <span style="font-size:10px;color:var(--text3)">(복수 선택 가능)</span></label>
      <div id="s-menus" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="sup-del-btn" onclick="delSup()" style="margin-right:auto;display:none">삭제</button>
      <button class="btn" onclick="closeM('sup-modal')">취소</button>
      <button class="btn btn-primary" onclick="saveSup()">저장</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="cat-modal">
  <div class="modal"><h3 id="cat-title">카테고리</h3>
    <div class="fg"><label>카테고리명</label><input id="cat-inp" type="text" placeholder="예) 기능성, 더마"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeM('cat-modal')">취소</button>
      <button class="btn btn-primary" onclick="saveCat()">저장</button>
    </div>
  </div>
</div>

<!-- 내보내기 모달 -->
<div class="modal-bg" id="exp-modal">
  <div class="modal" style="width:360px">
    <h3><i class="fa-solid fa-file-arrow-down" style="color:var(--success);margin-right:6px"></i>내보내기 설정</h3>
    <div class="fg">
      <label>바이어명 <span style="font-size:10px;color:var(--text3)">(문서 상단 제목에 표시)</span></label>
      <input id="exp-buyer-name" type="text" placeholder="예) ABC Trading Co.">
    </div>
    <div class="fg">
      <label>가격 항목 선택</label>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">
        <label style="display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer">
          <input type="checkbox" id="exp-price-krw" checked style="width:auto;accent-color:var(--accent)">
          바이어 단가 (VAT 미포함, 원)
        </label>
        <label style="display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer">
          <input type="checkbox" id="exp-price-usd" checked style="width:auto;accent-color:var(--accent)">
          PRICE (USD, ÷1,300)
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeM('exp-modal')">취소</button>
      <button class="btn btn-primary" onclick="doExport()"><i class="fa-solid fa-download"></i> 내보내기</button>
    </div>

</div>

<input type="file" id="img-inp" accept="image/*" style="display:none" onchange="handleImg(event)">
<div class="loading-overlay" id="loading"><div class="spinner"></div><div class="loading-text" id="loading-text">데이터 불러오는 중...</div></div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const API = 'https://script.google.com/macros/s/AKfycbzDYovNw5AZ971IjzfvwLqfdjue-XT5Qn8ye7WvZ5FjQXKNpHEoKauC-ckuziwN1FBf/exec';
const VAT = 1.1;

let S = {
  normalMenus: [{id:0,n:'용기'},{id:1,n:'단상자'},{id:2,n:'봉합라벨'},{id:3,n:'아웃박스'},{id:4,n:'내용물'},{id:5,n:'임가공비'},{id:6,n:'기타'}],
  specMenus:   [{id:0,n:'용기'},{id:1,n:'단상자'},{id:2,n:'봉합라벨'},{id:3,n:'아웃박스'},{id:4,n:'내용물'},{id:5,n:'임가공비'},{id:6,n:'기타'}],
  get menus(){ return this._menuTarget==='spec' ? this.specMenus : this.normalMenus; },
  _menuTarget: 'normal',
  suppliers: [],
  normalLabel: '일반 제품',
  normalProds: [],
  specGroups: [{id:1,label:'특이 제품',cats:[],prods:[]}],
  soldoutProds: [],
  editMenuId:null,editMenuIsNew:false,editMenuTarget:'normal',
  editSupId:null,
  linkPid:null,linkType:null,linkGid:null,linkMenuId:null,
  editCatGid:null,
  uploadPid:null,uploadType:null,uploadGid:null,
  nm:7,np:1,ng:2,ns:0,
  selectedCost: new Set(),
  selectedBuyer: new Set(),
  dragSrc: null
};

function getMenus(type){ return type==='spec' ? S.specMenus : S.normalMenus; }
function gT(p,type='normal'){ return getMenus(type).reduce((s,m)=>s+(parseFloat(p.costs[m.id])||0),0); }
function fmt(n){return Math.round(n).toLocaleString('ko-KR')+'원'}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function mkCosts(type='normal'){const c={};getMenus(type).forEach(m=>c[m.id]=0);return c}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function setSyncStatus(state){
  const dot=document.getElementById('sync-dot'),txt=document.getElementById('sync-text');
  dot.className='sync-dot'+(state==='saving'?' saving':state==='error'?' error':'');
  txt.textContent=state==='saving'?'저장 중...':state==='error'?'저장 실패':'저장됨';
}
function showLoading(msg='불러오는 중...'){document.getElementById('loading-text').textContent=msg;document.getElementById('loading').style.display='flex'}
function hideLoading(){document.getElementById('loading').style.display='none'}

// ── GOOGLE SHEETS SYNC ──
async function loadData(){
  showLoading('구글 시트에서 불러오는 중...');
  try{
    const res=await fetch(API+'?action=load');
    const json=await res.json();
    if(json.ok&&json.data){parseSheetData(json.data);showToast('데이터를 불러왔습니다')}
  }catch(e){showToast('불러오기 실패 — 기본값으로 시작합니다')}
  hideLoading();renderTab('cost');
}

function parseSheetData(data){
  if(data.menus&&data.menus.length>1){S.menus=data.menus.slice(1).map(r=>({id:Number(r[0]),n:r[1]||''}));S.nm=Math.max(...S.menus.map(m=>m.id))+1;}
  if(data.suppliers&&data.suppliers.length>1){S.suppliers=data.suppliers.slice(1).map(r=>({id:Number(r[0]),co:r[1]||'',ct:r[2]||'',ph:r[3]||'',em:r[4]||'',menuIds:JSON.parse(r[5]||'[]')}));if(S.suppliers.length)S.ns=Math.max(...S.suppliers.map(s=>s.id))+1;}
  if(data.config&&data.config.length){const row=data.config.find(r=>r[0]==='normalLabel');if(row)S.normalLabel=row[1]||'일반 제품';}
  if(data.normalProds&&data.normalProds.length>1){
    S.normalProds=data.normalProds.slice(1).map(r=>{const costs={};try{const c=JSON.parse(r[3]||'{}');S.menus.forEach(m=>{costs[m.id]=parseFloat(c[m.id])||0});}catch(e){}
    return{id:Number(r[0]),name:r[1]||'',qty:Number(r[2])||0,img:r[5]||null,costs,links:JSON.parse(r[4]||'{}'),buyerRate:parseFloat(r[6])||130};});
    if(S.normalProds.length)S.np=Math.max(...S.normalProds.map(p=>p.id))+1;
  }
  if(data.specGroups&&data.specGroups.length>1){S.specGroups=data.specGroups.slice(1).map(r=>({id:Number(r[0]),label:r[1]||'',cats:JSON.parse(r[2]||'[]'),prods:[]}));if(S.specGroups.length)S.ng=Math.max(...S.specGroups.map(g=>g.id))+1;}
  if(data.specProds&&data.specProds.length>1){
    data.specProds.slice(1).forEach(r=>{const gid=Number(r[6]);const g=S.specGroups.find(g=>g.id===gid);if(!g)return;
    const costs={};try{const c=JSON.parse(r[3]||'{}');S.menus.forEach(m=>{costs[m.id]=parseFloat(c[m.id])||0});}catch(e){}
    g.prods.push({id:Number(r[0]),name:r[1]||'',qty:Number(r[2])||0,img:r[7]||null,cat:r[8]||'',costs,links:JSON.parse(r[4]||'{}'),buyerRate:parseFloat(r[5])||130});});
    const allSP=[].concat(...S.specGroups.map(g=>g.prods));if(allSP.length)S.np=Math.max(S.np,...allSP.map(p=>p.id))+1;
  }
  if(data.soldout&&data.soldout.length>1){
    S.soldoutProds=data.soldout.slice(1).map(r=>{const costs={};try{const c=JSON.parse(r[3]||'{}');S.menus.forEach(m=>{costs[m.id]=parseFloat(c[m.id])||0});}catch(e){}
    return{id:Number(r[0]),name:r[1]||'',qty:Number(r[2])||0,img:r[5]||null,costs,links:JSON.parse(r[4]||'{}'),buyerRate:parseFloat(r[6])||130};});
  }
}

function serializeData(){
  const menusRows=[['id','name'],...S.menus.map(m=>[m.id,m.n])];
  const supRows=[['id','co','ct','ph','em','menuIds'],...S.suppliers.map(s=>[s.id,s.co,s.ct,s.ph,s.em,JSON.stringify(s.menuIds||[])])];
  const nProdRows=[['id','name','qty','costs','links','img','buyerRate'],...S.normalProds.map(p=>[p.id,p.name,p.qty||0,JSON.stringify(p.costs||{}),JSON.stringify(p.links||{}),p.img||'',p.buyerRate||130])];
  const sgRows=[['id','label','cats'],...S.specGroups.map(g=>[g.id,g.label,JSON.stringify(g.cats||[])])];
  const spRows=[['id','name','qty','costs','links','buyerRate','gid','img','cat']];
  S.specGroups.forEach(g=>g.prods.forEach(p=>spRows.push([p.id,p.name,p.qty||0,JSON.stringify(p.costs||{}),JSON.stringify(p.links||{}),p.buyerRate||130,g.id,p.img||'',p.cat||''])));
  const soRows=[['id','name','qty','costs','links','img','buyerRate'],...S.soldoutProds.map(p=>[p.id,p.name,p.qty||0,JSON.stringify(p.costs||{}),JSON.stringify(p.links||{}),p.img||'',p.buyerRate||130])];
  return{menus:menusRows,suppliers:supRows,normalProds:nProdRows,specGroups:sgRows,specProds:spRows,normalLabel:S.normalLabel,soldout:soRows};
}

let saveTimeout=null;
let isSaving=false;
let pendingSave=false;

function scheduleAutoSave(){
  clearTimeout(saveTimeout);
  setSyncStatus('saving');
  saveTimeout=setTimeout(()=>saveData(),2000); // 2초로 여유 증가
}

async function saveData(){
  if(isSaving){ pendingSave=true; return; }
  isSaving=true;
  pendingSave=false;

  // 낙관적 업데이트: 요청 즉시 저장됨 표시
  setSyncStatus('ok');
  const now = new Date().toLocaleString('ko-KR');
  document.getElementById('sync-text').textContent = '저장됨 '+now;

  try{
    const payload = JSON.stringify({
      action:'save',
      data:serializeData()
    });
    const url = API + '?action=save&payload=' + encodeURIComponent(payload);
    // 백그라운드 저장 (응답 기다리지 않음)
    fetch(url).then(res=>res.json()).then(json=>{
      if(!json.ok){
        setSyncStatus('error');
        showToast('⚠️ 저장 실패: '+(json.error||'오류'));
        setTimeout(()=>saveData(), 5000);
      } else {
        const t = json.data && json.data.savedAt ? json.data.savedAt : now;
        document.getElementById('sync-text').textContent = '저장됨 '+t;
      }
      if(pendingSave){ pendingSave=false; scheduleAutoSave(); }
    }).catch(e=>{
      setSyncStatus('error');
      showToast('⚠️ 저장 실패: '+e.message);
      setTimeout(()=>saveData(), 5000);
    });
  } catch(e){
    setSyncStatus('error');
    showToast('⚠️ 저장 실패: '+e.message);
  } finally {
    isSaving=false;
  }
}

// 페이지 닫기 전 저장 완료 확인
window.addEventListener('beforeunload', function(e){
  if(isSaving || saveTimeout){
    e.preventDefault();
    e.returnValue='저장 중입니다. 페이지를 닫으면 데이터가 손실될 수 있습니다.';
    return e.returnValue;
  }
});

// ── TABS ──
function sTab(t,el){
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('on'));
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('on'));
  if(el)el.classList.add('on');
  document.getElementById('pg-'+t).classList.add('on');
  renderTab(t);
}
function renderTab(t){
  const el=document.getElementById('pg-'+t);if(!el)return;
  if(t==='cost')el.innerHTML=buildCostPage();
  else if(t==='buyer')el.innerHTML=buildBuyerPage();
  else el.innerHTML=buildSupPage();
}

// ── SELECTION HELPERS ──
function toggleSelCost(id,type,gid){
  const key=`${type}|${gid}|${id}`;
  if(S.selectedCost.has(key))S.selectedCost.delete(key);else S.selectedCost.add(key);
  renderTab('cost');
}
function toggleAllCost(type,gid,checked){
  const prods=getList(type,gid);
  prods.forEach(p=>{const k=`${type}|${gid}|${p.id}`;if(checked)S.selectedCost.add(k);else S.selectedCost.delete(k);});
  renderTab('cost');
}
function getSelectedProds(type,gid){
  return getList(type,gid).filter(p=>S.selectedCost.has(`${type}|${gid}|${p.id}`));
}
function clearSelCost(){S.selectedCost.clear();}

function bulkDelete(type,gid){
  const sel=getSelectedProds(type,gid);if(!sel.length)return;
  if(!confirm(`선택한 ${sel.length}개 제품을 삭제할까요?`))return;
  sel.forEach(p=>{
    if(type==='normal')S.normalProds=S.normalProds.filter(x=>x.id!==p.id);
    else{const g=S.specGroups.find(g=>g.id===gid);if(g)g.prods=g.prods.filter(x=>x.id!==p.id);}
    S.selectedCost.delete(`${type}|${gid}|${p.id}`);
  });
  scheduleAutoSave();renderTab('cost');
}

function bulkSoldout(type,gid){
  const sel=getSelectedProds(type,gid);if(!sel.length)return;
  sel.forEach(p=>{
    S.soldoutProds.push({...p});
    if(type==='normal')S.normalProds=S.normalProds.filter(x=>x.id!==p.id);
    else{const g=S.specGroups.find(g=>g.id===gid);if(g)g.prods=g.prods.filter(x=>x.id!==p.id);}
    S.selectedCost.delete(`${type}|${gid}|${p.id}`);
  });
  scheduleAutoSave();renderTab('cost');
}

function restoreSoldout(id){
  const p=S.soldoutProds.find(x=>x.id===id);if(!p)return;
  S.normalProds.push(p);
  S.soldoutProds=S.soldoutProds.filter(x=>x.id!==id);
  scheduleAutoSave();renderTab('cost');
}
function delSoldout(id){
  if(!confirm('품절 제품을 완전히 삭제할까요?'))return;
  S.soldoutProds=S.soldoutProds.filter(x=>x.id!==id);
  scheduleAutoSave();renderTab('cost');
}

// ── COST PAGE ──
function buildCostPage(){
  let h=buildNormalSec();
  S.specGroups.forEach(g=>{h+=buildSpecSec(g)});
  h+=buildSoldoutSec();
  h+=`<button class="btn btn-ghost" style="margin:4px 0 8px" onclick="addSpecGroup()"><i class="fa-solid fa-plus"></i> 특이 제품 그룹 추가</button>`;
  h+=`<div class="info-box"><i class="fa-solid fa-circle-info" style="color:var(--text3)"></i> 행 드래그 → 순서 변경 &nbsp;·&nbsp; 이미지 클릭 → 업로드 &nbsp;·&nbsp; 메뉴명 클릭 → 수정</div>`;
  return h;
}

function buildNormalSec(){
  const prods=S.normalProds;
  const selCount=getSelectedProds('normal',null).length;
  const allChecked=prods.length>0&&prods.every(p=>S.selectedCost.has(`normal|null|${p.id}`));
  let h=`<div class="section"><div class="sec-head"><div class="sec-title"><input class="grp-name-input" value="${esc(S.normalLabel)}" onchange="S.normalLabel=this.value;scheduleAutoSave()"><span class="badge badge-n">일반</span></div>`;
  h+=`<div class="sec-actions"><button class="btn btn-primary btn-sm" onclick="addProd('normal',null)"><i class="fa-solid fa-plus"></i> 제품 추가</button></div></div>`;
  h+=buildBulkBar('normal',null,selCount);
  h+=buildTable(prods,'normal',null,allChecked);
  h+=`</div>`;
  return h;
}

function buildSpecSec(g){
  const prods=g.prods;
  const selCount=getSelectedProds('spec',g.id).length;
  const allChecked=prods.length>0&&prods.every(p=>S.selectedCost.has(`spec|${g.id}|${p.id}`));
  let h=`<div class="section" style="margin-top:16px"><div class="sec-head"><div class="sec-title">`;
  h+=`<input class="grp-name-input" value="${esc(g.label)}" onchange="updateGL(${g.id},this.value)"><span class="badge badge-s">특이</span>`;
  if(S.specGroups.length>1)h+=`<button class="btn btn-danger btn-sm btn-icon" onclick="delSpecGroup(${g.id})"><i class="fa-solid fa-trash"></i></button>`;
  h+=`</div><div class="sec-actions"><button class="btn btn-primary btn-sm" onclick="addProd('spec',${g.id})"><i class="fa-solid fa-plus"></i> 제품 추가</button></div></div>`;
  h+=buildBulkBar('spec',g.id,selCount);
  h+=buildTable(prods,'spec',g.id,allChecked);
  h+=`</div>`;
  return h;
}

function buildSoldoutSec(){
  if(!S.soldoutProds.length)return'';
  let h=`<div class="section" style="margin-top:16px"><div class="sec-head"><div class="sec-title"><span class="grp-name-input" style="cursor:default">품절 제품</span><span class="soldout-badge">품절</span></div></div>`;
  h+=`<div class="table-wrap"><table><thead><tr>`;
  h+=`<th style="width:40px">이미지</th><th style="min-width:80px">제품명</th><th style="min-width:76px;text-align:right">원가합계</th><th style="width:80px"></th></tr></thead><tbody>`;
  S.soldoutProds.forEach(p=>{
    const tot=gT(p);
    h+=`<tr>`;
    h+=`<td style="text-align:center">${p.img?`<img src="${p.img}" class="img-c" style="cursor:default;opacity:.5">`:`<div style="width:30px;height:30px;background:var(--surface2);border-radius:3px;opacity:.5"></div>`}</td>`;
    h+=`<td style="color:var(--text3)">${esc(p.name)}</td>`;
    h+=`<td class="total-cell" style="color:var(--text3)">${fmt(tot)}</td>`;
    h+=`<td style="display:flex;gap:4px;justify-content:flex-end;padding:4px">`;
    h+=`<button class="btn btn-sm" onclick="restoreSoldout(${p.id})" title="복원"><i class="fa-solid fa-rotate-left"></i></button>`;
    h+=`<button class="btn btn-danger btn-sm btn-icon" onclick="delSoldout(${p.id})"><i class="fa-solid fa-trash"></i></button>`;
    h+=`</td></tr>`;
  });
  h+=`</tbody></table></div></div>`;
  return h;
}

function buildBulkBar(type,gid,selCount){
  const gidKey=gid===null?'null':gid;
  if(!selCount)return`<div class="bulk-bar" id="bulk-${type}-${gidKey}"></div>`;
  return`<div class="bulk-bar show" id="bulk-${type}-${gidKey}">
    <span class="bulk-count">${selCount}개 선택됨</span>
    <button class="btn btn-danger btn-sm" onclick="bulkDelete('${type}',${gid})"><i class="fa-solid fa-trash"></i> 삭제</button>
    <button class="btn btn-sm" style="background:#ff9800;color:#fff;border-color:transparent" onclick="bulkSoldout('${type}',${gid})"><i class="fa-solid fa-ban"></i> 품절 처리</button>
    <button class="btn btn-sm" onclick="clearSelCost();renderTab('cost')">취소</button>
  </div>`;
}

function buildTable(prods,type,gid,allChecked){
  const menus=getMenus(type);
  const gidVal=gid===null?'null':gid;
  let h=`<div class="table-wrap"><table><thead><tr>`;
  h+=`<th class="col-check"><input type="checkbox" class="row-check" ${allChecked?'checked':''} onchange="toggleAllCost('${type}',${gid},this.checked)"></th>`;
  h+=`<th class="col-drag"></th>`;
  h+=`<th class="col-img" style="width:40px">이미지</th>`;
  h+=`<th class="col-name" style="min-width:80px">제품명</th>`;
  h+=`<th style="width:46px">입수량</th>`;
  menus.forEach(m=>{
    h+=`<th class="split-th"><div class="split-th-inner"><div class="split-th-top"><span style="cursor:pointer;text-decoration:underline dotted;text-underline-offset:2px" onclick="openEditMenu(${m.id},'${type}')">${esc(m.n)}</span></div><div class="split-th-bot">업체정보</div></div></th>`;
  });
  h+=`<th class="add-menu-th"><button class="add-menu-btn" onclick="openAddMenu('${type}')"><i class="fa-solid fa-plus"></i> 메뉴</button></th>`;
  h+=`<th style="min-width:78px;text-align:right">원가합계</th>`;
  h+=`<th style="min-width:78px;text-align:right">VAT포함</th>`;
  h+=`<th style="width:30px"></th>`;
  h+=`</tr></thead><tbody id="tbody-${type}-${gidVal}">`;
  if(!prods.length){
    const c=menus.length+7;
    h+=`<tr><td colspan="${c}" style="text-align:center;padding:20px;color:var(--text3)">제품을 추가하세요</td></tr>`;
  }
  prods.forEach(p=>{
    const tot=gT(p,type),vat=tot*VAT;
    const key=`${type}|${gid}|${p.id}`;
    const checked=S.selectedCost.has(key);
    h+=`<tr draggable="true" data-id="${p.id}" data-type="${type}" data-gid="${gidVal}" ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="dragDrop(event)" ondragend="dragEnd(event)" style="${checked?'background:var(--info-bg)':''}">`;
    h+=`<td class="col-check" style="text-align:center"><input type="checkbox" class="row-check" ${checked?'checked':''} onchange="toggleSelCost(${p.id},'${type}',${gid})"></td>`;
    h+=`<td class="col-drag" style="text-align:center;color:var(--text3);cursor:grab;font-size:12px">⠿</td>`;
    h+=`<td class="col-img" style="text-align:center">${p.img?`<img src="${p.img}" class="img-c" onclick="trigImg(${p.id},'${type}',${gid})" title="클릭하여 교체">`:`<div class="img-ph" onclick="trigImg(${p.id},'${type}',${gid})"><span>업로드</span></div>`}</td>`;
    h+=`<td class="col-name"><input type="text" value="${esc(p.name)}" onchange="upN(${p.id},'${type}',${gid},this.value)"></td>`;
    h+=`<td><input type="number" value="${p.qty||''}" min="1" placeholder="0" onchange="upQ(${p.id},'${type}',${gid},this.value)"></td>`;
    menus.forEach(m=>{
      const supId=(p.links||{})[m.id];
      const sup=S.suppliers.find(s=>s.id===supId);
      const supName=sup?sup.co:'';
      const curVal=p.costs[m.id]||0;
      h+=`<td class="split-td"><div class="split-td-inner">`;
      const dispVal = curVal > 0 ? curVal : '';
      h+=`<div class="split-top"><input type="number" value="${dispVal}" min="0" placeholder="0"
        onfocus="this.dataset.prev=this.value;this.dataset.hadval=(this.value!==''&&parseFloat(this.value)>0)?'1':'0'"
        onkeydown="if(event.key==='Escape'){this.value=this.dataset.prev;this.blur()}"
        onblur="confirmPrice(this,${p.id},'${type}',${gid},${m.id})"></div>`;
      h+=`<div class="split-bot${supName?'':' empty'}" onclick="openLink(${p.id},'${type}',${gid},${m.id})">${supName?esc(supName):'연결'}</div>`;
      h+=`</div></td>`;
    });
    h+=`<td></td>`;
    h+=`<td class="total-cell">${fmt(tot)}</td>`;
    h+=`<td class="vat-cell">${fmt(vat)}</td>`;
    h+=`<td style="text-align:center"><button class="btn btn-danger btn-icon btn-sm" onclick="delProd(${p.id},'${type}',${gid})"><i class="fa-solid fa-trash"></i></button></td>`;
    h+=`</tr>`;
  });
  h+=`</tbody></table></div>`;
  return h;
}

// 가격 입력 확인 팝업
function confirmPrice(input, pid, type, gid, mid){
  const newVal = parseFloat(input.value)||0;
  const prevVal = parseFloat(input.dataset.prev)||0;
  if(newVal === prevVal) return; // 변경 없으면 통과

  // 빈칸(0)에서 처음 입력하는 경우 → 팝업 없이 바로 저장
  const hadVal = input.dataset.hadval === '1';
  if(!hadVal){
    upC(pid, type, gid, mid, newVal);
    return;
  }

  // 기존값이 있는 경우 → 확인 팝업
  const rect = input.getBoundingClientRect();
  const popup = document.getElementById('price-confirm-popup');
  const fmt2 = n => Math.round(n).toLocaleString('ko-KR')+'원';
  document.getElementById('pc-prev').textContent = fmt2(prevVal);
  document.getElementById('pc-new').textContent = fmt2(newVal);
  popup.style.display='flex';
  popup.style.top = (rect.bottom + window.scrollY + 6)+'px';
  popup.style.left = Math.max(4, rect.left + window.scrollX - 40)+'px';
  popup._pid=pid; popup._type=type; popup._gid=gid; popup._mid=mid;
  popup._input=input; popup._prev=prevVal; popup._new=newVal;
}
function pcConfirm(){
  const pop=document.getElementById('price-confirm-popup');
  upC(pop._pid,pop._type,pop._gid,pop._mid,pop._new);
  pop.style.display='none';
}
function pcCancel(){
  const pop=document.getElementById('price-confirm-popup');
  pop._input.value=pop._prev;
  pop.style.display='none';
}

// ── DRAG & DROP ──
function dragStart(e){
  S.dragSrc=e.currentTarget;
  e.dataTransfer.effectAllowed='move';
  e.currentTarget.classList.add('dragging');
}
function dragOver(e){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  document.querySelectorAll('tr.drag-over').forEach(r=>r.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
}
function dragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('tr.drag-over').forEach(r=>r.classList.remove('drag-over'));
}
function dragDrop(e){
  e.preventDefault();
  const src=S.dragSrc,tgt=e.currentTarget;
  if(!src||src===tgt)return;
  const type=src.dataset.type,gidStr=src.dataset.gid;
  const gid=gidStr==='null'?null:parseInt(gidStr);
  const srcId=parseInt(src.dataset.id),tgtId=parseInt(tgt.dataset.id);
  const list=getList(type,gid);
  const si=list.findIndex(p=>p.id===srcId),ti=list.findIndex(p=>p.id===tgtId);
  if(si<0||ti<0)return;
  const [moved]=list.splice(si,1);list.splice(ti,0,moved);
  scheduleAutoSave();renderTab('cost');
}

function handleImg(e){
  const f=e.target.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    // 이미지 압축 (500×500 이하, 품질 0.7)
    const img=new Image();
    img.onload=()=>{
      const MAX=500;
      const canvas=document.createElement('canvas');
      let w=img.width, h=img.height;
      if(w>MAX||h>MAX){
        if(w>h){h=Math.round(h*MAX/w);w=MAX;}
        else{w=Math.round(w*MAX/h);h=MAX;}
      }
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const compressed=canvas.toDataURL('image/jpeg',0.72);
      const p=findProd(S.uploadPid,S.uploadType,S.uploadGid);
      if(p){p.img=compressed;scheduleAutoSave();renderTab('cost')}
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(f);e.target.value='';
}

  document.getElementById('sup-del-btn').style.display='inline-flex';
  document.getElementById('s-co').value=s?s.co:'';
  document.getElementById('s-ct').value=s?s.ct:'';
  document.getElementById('s-ph').value=s?s.ph:'';
  document.getElementById('s-em').value=s?s.em:'';
  renderMenuCheckboxes(s ? (s.menuIds||[]) : []);
  document.getElementById('sup-modal').classList.add('on');
}
function renderMenuCheckboxes(selected){
  const wrap=document.getElementById('s-menus');
  wrap.innerHTML=S.menus.map(m=>`
    <label style="display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:${selected.includes(m.id)?'var(--accent)':'var(--surface)'};color:${selected.includes(m.id)?'#fff':'var(--text)'}">
      <input type="checkbox" value="${m.id}" ${selected.includes(m.id)?'checked':''} style="display:none" onchange="this.parentElement.style.background=this.checked?'var(--accent)':'var(--surface)';this.parentElement.style.color=this.checked?'#fff':'var(--text)'">
      ${esc(m.n)}
    </label>`).join('');
}
function saveSup(){
  const co=document.getElementById('s-co').value.trim();if(!co)return;
  const menuIds=[...document.querySelectorAll('#s-menus input[type=checkbox]:checked')].map(el=>parseInt(el.value));
  if(S.editSupId===null)S.suppliers.push({id:S.ns++,co,ct:document.getElementById('s-ct').value.trim(),ph:document.getElementById('s-ph').value.trim(),em:document.getElementById('s-em').value.trim(),menuIds});
  else{const s=S.suppliers.find(x=>x.id===S.editSupId);if(s){s.co=co;s.ct=document.getElementById('s-ct').value.trim();s.ph=document.getElementById('s-ph').value.trim();s.em=document.getElementById('s-em').value.trim();s.menuIds=menuIds;}}
  scheduleAutoSave();closeM('sup-modal');renderTab('supplier');
}
function delSup(){
  if(S.editSupId===null)return;const id=S.editSupId;
  S.suppliers=S.suppliers.filter(s=>s.id!==id);
  [...S.normalProds,...S.specGroups.flatMap(g=>g.prods)].forEach(p=>{if(p.links)Object.keys(p.links).forEach(k=>{if(p.links[k]===id)delete p.links[k]})});
  scheduleAutoSave();closeM('sup-modal');renderTab('supplier');
}

function openAddCat(gid){S.editCatGid=gid;document.getElementById('cat-title').textContent='카테고리 추가';document.getElementById('cat-inp').value='';document.getElementById('cat-modal').classList.add('on')}
function saveCat(){const n=document.getElementById('cat-inp').value.trim();if(!n)return;const g=S.specGroups.find(g=>g.id===S.editCatGid);if(!g)return;g.cats.push(n);scheduleAutoSave();closeM('cat-modal');renderTab('cost')}
function delCat(gid,idx){const g=S.specGroups.find(g=>g.id===gid);if(!g||g.cats.length<=1)return;const old=g.cats[idx];g.cats.splice(idx,1);g.prods.forEach(p=>{if(p.cat===old)p.cat=g.cats[0]});scheduleAutoSave();renderTab('cost')}

function getExportProds(type,gid){
  const gidKey=gid===null?'null':gid;
  const allProds=getList(type,gid);
  const selKeys=[...S.selectedBuyer].filter(k=>k.startsWith(`${type}|${gidKey}|`));
  const selIds=new Set(selKeys.map(k=>parseInt(k.split('|')[2])));
  return selIds.size>0?allProds.filter(p=>selIds.has(p.id)):allProds;
}
function getExportLabel(type,gid){
  return type==='normal'?S.normalLabel:(S.specGroups.find(g=>g.id===gid)||{}).label||'특이제품';
}

// 내보내기 모달 열기
function exportXlsx(type,gid){ openExportModal(type,gid,'xlsx'); }
function exportHtml(type,gid){ openExportModal(type,gid,'html'); }

function openExportModal(type,gid,fmt){
  S._exportType=type; S._exportGid=gid; S._exportFmt=fmt;
  S._exportIsAll=(type==='all');
  document.getElementById('exp-buyer-name').value='';
  document.getElementById('exp-price-krw').checked=true;
  document.getElementById('exp-price-usd').checked=true;
  document.getElementById('exp-modal').classList.add('on');
}

function doExport(){
  const buyerName=document.getElementById('exp-buyer-name').value.trim();
  const inclKrw=document.getElementById('exp-price-krw').checked;
  const inclUsd=document.getElementById('exp-price-usd').checked;
  const type=S._exportType, gid=S._exportGid, fmt=S._exportFmt;
  const isAll=S._exportIsAll;
  const prods=isAll?getExportProdsAll():getExportProds(type,gid);
  const isS=!isAll&&type==='spec';
  const label=isAll?'제품 리스트':getExportLabel(type,gid);
  closeM('exp-modal');
  if(fmt==='xlsx') doExportXlsx(prods,isS,label,buyerName,inclKrw,inclUsd);
  else doExportHtml(prods,isS,label,buyerName,inclKrw,inclUsd);
}

function doExportXlsx(prods,isS,label,buyerName,inclKrw,inclUsd){
  const wb=XLSX.utils.book_new();
  const title=`CENOLA 단가표${buyerName?' _ '+buyerName:''}`;
  // 헤더
  const baseCols=isS?['제품명','카테고리','입수량']:['제품명','입수량'];
  if(inclKrw) baseCols.push('바이어단가(VAT미포함,원)');
  if(inclUsd) baseCols.push('PRICE(USD)');
  const rows=[[title],[], baseCols];
  prods.forEach(p=>{
    const tot=gT(p),rate=parseFloat(p.buyerRate)||100,bp=Math.round(tot*(rate/100));
    const usd=parseFloat((bp/EXCHANGE_RATE).toFixed(2));
    const row=isS?[p.name,p.cat||'',p.qty||0]:[p.name,p.qty||0];
    if(inclKrw) row.push(bp);
    if(inclUsd) row.push(usd);
    rows.push(row);
  });
  const ws=XLSX.utils.aoa_to_sheet(rows);
  // 제목 행 병합
  const mergeEnd=baseCols.length-1;
  ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:mergeEnd}}];
  ws['!cols']=baseCols.map((_,i)=>({wch:i===0?24:i===1&&isS?14:14}));
  // 제목 스타일 (폰트 크기)
  if(ws['A1']) ws['A1'].s={font:{bold:true,sz:14}};
  XLSX.utils.book_append_sheet(wb,ws,'바이어단가표');
  XLSX.writeFile(wb,`${label}_바이어단가표.xlsx`);
}

function doExportHtml(prods,isS,label,buyerName,inclKrw,inclUsd){
  exportAsHtmlTable(prods,isS,label,buyerName,inclKrw,inclUsd);
}

function exportAsHtmlTable(prods, isS, label, buyerName='', inclKrw=true, inclUsd=true){
  const buyerLabel = buyerName ? buyerName.trim() : '';
  const rows = prods.map(p=>{
    const tot=gT(p), rate=parseFloat(p.buyerRate)||100, bp=Math.round(tot*(rate/100));
    const imgTag = p.img
      ? `<img src="${p.img}" style="width:80px;height:80px;object-fit:cover;border-radius:4px">`
      : '<div style="width:80px;height:80px;background:#f0f0f0;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#aaa">없음</div>';
    const usd = '$'+(bp/EXCHANGE_RATE).toFixed(2);
    return {p, tot, bp, usd, imgTag, isS};
  });

  const baseCols = isS ? ['이미지','제품명','카테고리','입수량'] : ['이미지','제품명','입수량'];
  if(inclKrw) baseCols.push('가격(VAT 미포함)');
  if(inclUsd) baseCols.push('PRICE(USD)');
  const headerCols = baseCols;

  const tableRows = rows.map(({p, bp, usd, imgTag, isS})=>{
    const base = isS ? [imgTag, esc(p.name), esc(p.cat||''), p.qty||0] : [imgTag, esc(p.name), p.qty||0];
    if(inclKrw) base.push(Math.round(bp).toLocaleString('ko-KR')+'원');
    if(inclUsd) base.push(usd);
    const cells = base;
    return `<tr>${cells.map((c,i)=>{
      let style='padding:10px 12px;border:1px solid #e0e0e0;vertical-align:middle;';
      if(i===0) style+='text-align:center;';
      if(inclUsd && i===cells.length-1) style+='font-weight:700;color:#1a5fb4;text-align:right;';
      else if(inclKrw && i===cells.length-(inclUsd?2:1)) style+='font-weight:600;color:#1a7f4b;text-align:right;';
      return `<td style="${style}">${c}</td>`;
    }).join('')}</tr>`;
  }).join('');

  const html = `<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>CENOLA 단가표${buyerLabel ? ' _ '+buyerLabel : ''}</title>
<style>
  body { font-family: 'Noto Sans KR', sans-serif; padding: 32px; color: #1a1917; background: #f5f4f0; }
  .doc-title { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
  .brand { font-size: 22px; font-weight: 700; letter-spacing: -.5px; color: #1a1917; }
  .sep { font-size: 18px; color: #ccc; }
  .buyer { font-size: 20px; font-weight: 600; color: #2a2926; }
  .sub { font-size: 12px; color: #888; margin-bottom: 24px; }
  table { border-collapse: collapse; width: 100%; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  thead th { background: #2a2926; color: #fff; padding: 10px 12px; font-size: 12px; font-weight: 500; text-align: left; border: 1px solid #444; }
  tbody tr:hover td { background: #f9f8f5; }
  @media print {
    body { background: #fff; padding: 16px; }
    .no-print { display: none; }
  }
</style>
</head>
<body>
<div class="no-print" style="margin-bottom:16px">
  <button onclick="window.print()" style="padding:8px 18px;background:#2a2926;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px">🖨️ 인쇄 / PDF 저장</button>
</div>
<div class="doc-title">
  <span class="brand">CENOLA 단가표</span>
  ${buyerLabel ? '<span class="sep">_</span><span class="buyer">'+buyerLabel+'</span>' : ''}
</div>
<div class="sub">출력일: ${new Date().toLocaleDateString('ko-KR')} &nbsp;·&nbsp; 총 ${prods.length}개 제품</div>
<table>
  <thead><tr>${headerCols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
  <tbody>${tableRows}</tbody>
</table>
</body>
</html>`;

  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${label}_바이어단가표.html`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('이미지 포함 단가표 다운로드 완료 ✓');
}

function closeM(id){document.getElementById(id).classList.remove('on')}

// ── INIT ──
loadData();
